spring.application.name=TasfB2B-DHGS

# Servidor
server.port=8080

# Datasource PostgreSQL (credenciales sincronizadas con docker-compose.yml)
spring.datasource.url=jdbc:postgresql://localhost:5432/tasf_b2b
spring.datasource.username=tasf
spring.datasource.password=tasf123
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# TODO: migrar a Flyway antes de tener datos productivos. ddl-auto=update solo para fase de desarrollo.

# Spring servlet (uploads admin import)
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=100MB

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true

# Configuracion base del planificador
planner.defaults.epoch-hours=4
planner.defaults.population-size=6
planner.defaults.time-limit-seconds=2

# Datasets de trabajo para desarrollo local
planner.datasets.demo.aeropuertos=src/test/resources/datos/estudiantes.txt
planner.datasets.demo.vuelos=src/test/resources/datos/planes_vuelo.txt
planner.datasets.demo.envios-dir=src/test/resources/datos/envios_preliminar_test

planner.datasets.real.aeropuertos=src/test/resources/datos/estudiantes_real.txt
planner.datasets.real.vuelos=src/test/resources/datos/planes_vuelo_real.txt
planner.datasets.real.envios-dir=src/test/resources/datos/envios_preliminar

# Logging
logging.level.com.tasfb2b.dhgs=DEBUG
logging.level.com.tasfb2b.backend=DEBUG
