services:
  postgres:
    image: postgres:15-alpine
    container_name: tasf-b2b-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tasf_b2b}
      POSTGRES_USER: ${POSTGRES_USER:-tasf}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tasf123}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - tasf-network

  redis:
    image: redis:7-alpine
    container_name: tasf-b2b-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - tasf-network

  mongo:
    image: mongo:7
    container_name: tasf-b2b-mongo
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_DB:-tasf_b2b}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - tasf-network

networks:
  tasf-network:
    driver: bridge

volumes:
  postgres_data:
  mongo_data:

